site_name: 个人知识库
site_description: AI 驱动开发 · 开发方法论 · 工具与实践
site_url: https://jinianxiang-trec.github.io/knowledge-share/

docs_dir: docs

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: deep-purple
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式

plugins:
  - search:
      lang: zh
  - roamlinks

nav:
  - 首页: 00 - 首页.md

  - AI 驱动开发:
    - 概览: 10 - AI 驱动开发/_MOC AI 驱动开发.md
    - AI Agent 前沿: "10 - AI 驱动开发/AI Agent 驱动开发的最前沿：从基于指令的开发迈向下一步.md"
    - 文档设计思考: "10 - AI 驱动开发/关于支撑 AI Agent 开发的文档设计的思考.md"
    - Claude Code Skills: "10 - AI 驱动开发/Claude Code Skills：让 AI 变身专业工匠.md"

  - 开发方法论:
    - 概览: 20 - 开发方法论/_MOC 开发方法论.md
    - SDD 规格驱动开发:
      - SDD 入门: "20 - 开发方法论/SDD/SDD 规格驱动开发.md"
      - AI 编程范式演进: "20 - 开发方法论/SDD/AI 编程范式演进：从代码补全到 Vibe Coding、Spec Coding.md"
      - Vibe Coding 到 SDD: "20 - 开发方法论/SDD/Vibe Coding已经是过去式了：Spec Driven Development（SDD） 指南.md"
      - 五个觉醒: "20 - 开发方法论/SDD/从 Vibe Coding 到 Spec-Driven：AI 原生开发的五个觉醒.md"
      - Spec-as-source: "20 - 开发方法论/SDD/Spec-as-source 的理想与现实.md"
      - 两年思考与破局: "20 - 开发方法论/SDD/从 Vibe Coding 到 Spec-Driven：一个程序员与 AI 协作两年的思考与破局.md"

  - 工具与实践:
    - 概览: 30 - 工具与实践/_MOC 工具与实践.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
